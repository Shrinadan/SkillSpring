<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Books Management</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body { background-color: #f8f9fa; }
        .page-title { font-weight: 600; }
        .card { border-radius: 12px; }
        .table th { background-color: #0d6efd; color: white; }
    </style>
</head>

<body>

<nav class="navbar navbar-dark bg-primary mb-4">
    <div class="container-fluid">
        <span class="navbar-brand mb-0 h1">📚 Book Management System</span>
        <a href="/index" class="btn btn-light btn-sm">Home</a>
    </div>
</nav>

<div class="container">
    <div class="card shadow-sm">
        <div class="card-body">

            <h3 class="page-title mb-4 text-center">Books List</h3>

            <a href="/add" class="btn btn-primary mb-3">➕ Add The Books</a>

            <table class="table table-bordered table-hover text-center align-middle">
                <thead>
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Description</th>
                    <th>Action</th>
                </tr>
                </thead>

                <tbody>
                <tr th:each="book : ${books}">
                    <td th:text="${book.id}"></td>
                    <td th:text="${book.name}"></td>
                    <td th:text="${book.discription}"></td>

                    <td>
                        <a th:href="@{/edit/{id}(id=${book.id})}"
                           class="btn btn-primary btn-sm">
                           ✏️ Edit
                        </a>

                        <a th:href="@{/delete(bookid=${book.id})}"
                           class="btn btn-danger btn-sm"
                           onclick="return confirmDelete()">
                           ❌ Delete
                        </a>
                    </td>
                </tr>

                <tr th:if="${#lists.isEmpty(books)}">
                    <td colspan="4" class="text-muted">No books available</td>
                </tr>
                </tbody>
            </table>

            <div class="text-center mt-3">
                <a href="/index" class="btn btn-secondary">⬅ Back to Front Page</a>
            </div>

        </div>
    </div>
</div>

<!-- ONE correct JS function -->
<script>
function confirmDelete() {
    return confirm("Are you sure you want to delete this book?");
}
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
